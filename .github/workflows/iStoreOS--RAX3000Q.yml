name: Build iStoreOS for RAX3000Q (OpenWrt 23.05)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-23.05
  CONFIG_FILE: .config

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: 安装依赖
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget curl \
        libelf-dev autoconf automake libtool pkg-config

    - name: 下载OpenWrt 23.05源码
      run: |
        git clone $REPO_URL --depth=1 -b $REPO_BRANCH openwrt

    - name: 添加iStore源
      run: |
        cd openwrt
        # 添加iStore源
        echo "src-git istore https://github.com/linkease/istore-openwrt-feed.git" >> feeds.conf.default
        # 可选：添加luci-app-store源
        echo "src-git istore_luci https://github.com/linkease/istore-ui-openwrt-app-store.git" >> feeds.conf.default
        
        # 更新并安装feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # 验证istore目录是否存在
        if [ -d "feeds/istore" ]; then
          echo "✅ iStore feeds 安装成功"
        else
          echo "❌ iStore feeds 安装失败"
          exit 1
        fi

    - name: 复制配置文件
      run: |
        cd openwrt
        # 复制你的配置文件
        cp $GITHUB_WORKSPACE/$CONFIG_FILE .config 2>/dev/null || echo "⚠️ 配置文件不存在，使用默认配置"
        make defconfig

    - name: 下载软件包源码
      run: |
        cd openwrt
        make download -j8 V=s
        # 检查下载的文件
        find dl -size -1024c -exec ls -l {} \;

    - name: 编译固件
      run: |
        cd openwrt
        # 先尝试用多核编译，如果失败则单核编译
        make -j$(nproc) V=s || make -j1 V=s

    - name: 上传固件
      uses: actions/upload-artifact@v6
      with:
        name: OpenWrt-23.05-RAX3000Q-iStoreOS
        path: |
          openwrt/bin/targets/*/*
          !openwrt/bin/targets/*/packages
        retention-days: 7

    - name: 上传编译日志（如果失败）
      if: failure()
      uses: actions/upload-artifact@v6
      with:
        name: build-logs
        path: openwrt/logs/
        retention-days: 7

name: Download Firmware from Specific Run

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'd8a885a'
        required: true
        default: 'd8a885a'

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Download all artifacts from run
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 创建下载目录
        mkdir -p firmware
        
        # 下载该运行的所有 artifacts
        gh run download ${{ github.event.inputs.run_id }} --dir firmware
        
        echo "📦 下载的文件："
        ls -la firmware/
        
    - name: Upload firmware
      uses: actions/upload-artifact@v6
      with:
        name: RAX3000Q-Firmware
        path: firmware/

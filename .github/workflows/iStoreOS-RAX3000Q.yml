name: Build iStoreOS for RAX3000Q (OpenWrt 23.05)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-23.05
  CONFIG_FILE: .config

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: 安装依赖
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget curl \
        libelf-dev autoconf automake libtool pkg-config

    - name: 下载OpenWrt 23.05源码
      run: |
        git clone $REPO_URL --depth=1 -b $REPO_BRANCH openwrt

    - name: 配置iStore源
      run: |
        cd openwrt
        echo "src-git packages https://git.openwrt.org/feed/packages.git;$REPO_BRANCH" > feeds.conf.default
        echo "src-git luci https://git.openwrt.org/project/luci.git;$REPO_BRANCH" >> feeds.conf.default
        echo "src-git routing https://git.openwrt.org/feed/routing.git;$REPO_BRANCH" >> feeds.conf.default
        echo "src-git telephony https://git.openwrt.org/feed/telephony.git;$REPO_BRANCH" >> feeds.conf.default
        echo "src-git istore https://github.com/linkease/istore.git;main" >> feeds.conf.default
        
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 复制配置文件
      run: |
        cd openwrt
        cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
        make defconfig

    - name: 下载软件包源码
      run: |
        cd openwrt
        make download -j8 V=s

    - name: 应用编译修复
      run: |
        cd openwrt
        
        echo "=== 应用编译修复 ==="
        
        # 修复格式安全警告
        echo "修复格式安全警告..."
        if [ -d "package/network/services/dnsmasq" ]; then
          find package/network/services/dnsmasq -name "*.c" -type f -exec sed -i 's/fprintf(stderr, _("/fprintf(stderr, "%s", _("/g' {} \; 2>/dev/null || true
        fi
        
        # 修复内联警告
        echo "修复内联函数警告..."
        find package -name "*.c" -type f -exec sed -i 's/inline bool xs_has_arg/bool xs_has_arg/g' {} \; 2>/dev/null || true
        
        # 修复其他格式问题
        find package -name "*.c" -type f -exec sed -i 's/fprintf(stderr, gettext(/fprintf(stderr, "%s", gettext(/g' {} \; 2>/dev/null || true
        find package -name "*.c" -type f -exec sed -i 's/fprintf(stderr, dgettext(/fprintf(stderr, "%s", dgettext(/g' {} \; 2>/dev/null || true
        
        echo "✅ 编译修复完成"

    - name: 编译固件
      run: |
        cd openwrt
        echo "开始编译固件..."
        # 先尝试全速编译，失败则降级为单线程详细模式
        make -j$(nproc) V=s || make -j1 V=sc

    # ========== 关键修改部分：确保上传 ==========
    - name: 收集所有固件文件
      run: |
        cd openwrt
        echo "🔍 正在搜索所有编译生成的固件文件..."
        
        # 创建统一的固件收集目录
        mkdir -p $GITHUB_WORKSPACE/firmware-collection
        
        # 查找并复制所有可能的固件文件
        echo "📦 查找 .bin, .img, .ubi 文件..."
        find bin/targets/ -type f \( \
          -name "*.bin" -o \
          -name "*.img" -o \
          -name "*.ubi" -o \
          -name "*.tar" -o \
          -name "*.gz" -o \
          -name "*.xz" -o \
          -name "*squashfs*" -o \
          -name "*sysupgrade*" -o \
          -name "*factory*" \
        \) -exec cp -v {} $GITHUB_WORKSPACE/firmware-collection/ \;
        
        # 同时复制整个 profiles.json 文件（包含固件信息）
        find bin/targets/ -name "profiles.json" -exec cp -v {} $GITHUB_WORKSPACE/firmware-collection/ \;
        
        # 列出找到的所有文件
        echo "✅ 已收集以下文件："
        ls -la $GITHUB_WORKSPACE/firmware-collection/
        
        # 统计文件数量
        count=$(ls -1 $GITHUB_WORKSPACE/firmware-collection/ 2>/dev/null | wc -l)
        echo "📊 共找到 $count 个文件"
        
        # 如果没找到任何文件，输出警告
        if [ $count -eq 0 ]; then
          echo "⚠️ 警告：没有找到任何固件文件！"
          echo "📁 查看 bin/targets/ 目录结构："
          find bin/targets/ -type d | head -20
        fi
        
    - name: 上传固件（统一收集版）
      if: success() || failure()  # 即使编译有警告也尝试上传
      uses: actions/upload-artifact@v6
      with:
        name: OpenWrt-23.05-RAX3000Q-iStoreOS
        path: firmware-collection/
        retention-days: 7
        if-no-files-found: warn
        compression-level: 6  # 添加压缩，节省空间
        
    - name: 上传编译日志和配置（如果失败）
      if: failure()
      uses: actions/upload-artifact@v6
      with:
        name: build-logs-and-config
        path: |
          openwrt/logs/
          openwrt/.config
          openwrt/feeds.conf.default
          openwrt/feeds/istore/
          openwrt/bin/targets/*/profiles.json
        retention-days: 7
        if-no-files-found: warn

name: Build iStoreOS for RAX3000Q (OpenWrt 23.05)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-23.05
  CONFIG_FILE: rax3000q.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      
    steps:
    - name: 检查系统环境
      run: |
        echo "系统信息："
        uname -a
        echo "CPU信息："
        nproc
        echo "内存信息："
        free -h
        echo "磁盘信息："
        df -h

    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 安装编译依赖
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget curl \
        libelf-dev autoconf automake libtool pkg-config \
        python3 python3-pip python3-dev rename pigz libz-dev

    - name: 设置编译环境
      run: |
        # 设置文件描述符限制
        echo "fs.file-max = 65535" | sudo tee -a /etc/sysctl.conf
        sudo sysctl -p
        ulimit -n 65535
        
        # 创建编译目录
        mkdir -p openwrt

    - name: 下载OpenWrt 23.05源码
      run: |
        git clone $REPO_URL --depth=1 -b $REPO_BRANCH openwrt
        cd openwrt
        echo "源码版本："
        git log -1 --pretty=format:"%h - %an, %ar : %s"

    - name: 配置软件源
      run: |
        cd openwrt
        
        # 配置官方源
        cat > feeds.conf.default << EOF
src-git packages https://git.openwrt.org/feed/packages.git;$REPO_BRANCH
src-git luci https://git.openwrt.org/project/luci.git;$REPO_BRANCH
src-git routing https://git.openwrt.org/feed/routing.git;$REPO_BRANCH
src-git telephony https://git.openwrt.org/feed/telephony.git;$REPO_BRANCH
src-git istore https://github.com/linkease/istore.git;main
EOF
        
        # 更新 feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 复制配置文件
      run: |
        cd openwrt
        if [ -f $GITHUB_WORKSPACE/$CONFIG_FILE ]; then
          cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
          echo "✅ 配置文件已复制"
        else
          echo "❌ 配置文件不存在：$CONFIG_FILE"
          exit 1
        fi

    - name: 验证配置文件
      run: |
        cd openwrt
        
        echo "=== 配置文件验证 ==="
        
        # 检查关键配置
        grep "CONFIG_TARGET_ipq50xx_arm_DEVICE_cmcc_rax3000q=y" .config || echo "⚠️ 设备选择未找到"
        grep "# CONFIG_PACKAGE_dnsmasq is not set" .config || echo "⚠️ dnsmasq禁用未设置"
        grep "CONFIG_PACKAGE_dnsmasq-full=y" .config || echo "⚠️ dnsmasq-full未启用"
        
        # 检查镜像格式
        grep "CONFIG_TARGET_ROOTFS_SQUASHFS=y" .config || echo "⚠️ squashfs未启用"
        grep "CONFIG_TARGET_ROOTFS_UBIFS=y" .config || echo "⚠️ ubifs未启用"
        grep "CONFIG_TARGET_UBI=y" .config || echo "⚠️ ubi未启用"
        
        # 更新配置
        make defconfig
        
        echo "✅ 配置文件验证完成"

    - name: 下载软件包源码
      run: |
        cd openwrt
        echo "开始下载软件包源码..."
        
        # 首次尝试完整下载
        make download -j8 V=s || {
          echo "首次下载失败，尝试单线程下载..."
          make download -j1 V=s
        }
        
        # 检查下载情况
        find dl -size -1024c -exec ls -l {} \; 2>/dev/null || true
        
        echo "✅ 源码下载完成"

    - name: 应用编译修复
      run: |
        cd openwrt
        
        echo "=== 应用编译修复 ==="
        
        # 1. 修复 dnsmasq 格式安全警告
        echo "修复 dnsmasq 格式警告..."
        if [ -d "package/network/services/dnsmasq" ]; then
          find package/network/services/dnsmasq -name "*.c" -type f -exec sed -i \
            -e 's/fprintf(stderr, _("/fprintf(stderr, "%s", _("/g' \
            -e 's/fprintf(stderr, gettext(/fprintf(stderr, "%s", gettext(/g' \
            -e 's/fprintf(stderr, dgettext(/fprintf(stderr, "%s", dgettext(/g' {} \; 2>/dev/null || true
        fi
        
        # 2. 修复内联函数警告
        echo "修复内联函数警告..."
        find package -name "*.c" -type f -exec sed -i 's/inline bool xs_has_arg/bool xs_has_arg/g' {} \; 2>/dev/null || true
        
        # 3. 修复 iwinfo 编译问题
        echo "修复 iwinfo 编译问题..."
        if [ -d "package/network/utils/iwinfo" ]; then
          touch package/network/utils/iwinfo/*.c
        fi
        
        # 4. 设置编译优化
        echo "设置编译优化参数..."
        cat >> .config << "EOF"

# 编译优化选项
CONFIG_DEBUG_INFO=n
CONFIG_STRIP_KERNEL_EXPORTS=y
CONFIG_USE_MKLIBS=y
CONFIG_USE_SSTRIP=y
EOF
        
        echo "✅ 编译修复完成"

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        
        # 设置编译线程数
        CORES=$(nproc)
        echo "使用 $CORES 线程编译"
        
        # 记录开始时间
        START_TIME=$(date +%s)
        
        # 尝试多线程编译
        echo "开始编译..."
        make -j$CORES V=s || {
          EXIT_CODE=$?
          echo "多线程编译失败（错误码：$EXIT_CODE），尝试单线程调试..."
          make -j1 V=sc
        }
        
        # 记录结束时间
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "编译时长：$(($DURATION / 60))分$(($DURATION % 60))秒"
        
        # 检查编译结果
        if [ -d "bin/targets" ]; then
          echo "✅ 编译成功"
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "❌ 编译失败"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        fi

    - name: 整理固件
      if: success()
      run: |
        cd openwrt/bin/targets/ipq50xx/arm
        
        echo "=== 固件信息 ==="
        
        # 重命名固件，添加日期信息
        DATE=$(date +%Y%m%d)
        for file in *.bin *.img *.ubi; do
          if [ -f "$file" ]; then
            new_name="${file%.*}-${DATE}.${file##*.}"
            mv "$file" "$new_name"
            echo "重命名: $file -> $new_name"
            
            # 计算文件哈希值
            md5sum "$new_name" > "$new_name.md5"
            sha256sum "$new_name" > "$new_name.sha256"
            
            # 显示文件信息
            ls -lh "$new_name"
            echo "MD5: $(cat $new_name.md5)"
            echo ""
          fi
        done
        
        # 创建固件列表
        ls -la > firmware-list.txt

    - name: 上传固件
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: iStoreOS-RAX3000Q-${{ github.run_number }}
        path: |
          openwrt/bin/targets/*/*/*.bin
          openwrt/bin/targets/*/*/*.img
          openwrt/bin/targets/*/*/*.ubi
          openwrt/bin/targets/*/*/*.md5
          openwrt/bin/targets/*/*/*.sha256
          openwrt/bin/targets/*/*/firmware-list.txt
        retention-days: 30
        if-no-files-found: error

    - name: 上传编译日志（失败时）
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ github.run_number }}
        path: |
          openwrt/logs/
          openwrt/.config
          openwrt/feeds.conf.default
          openwrt/feeds/istore/
          openwrt/dl/
          openwrt/build_dir/
          openwrt/bin/targets/
        retention-days: 7

    - name: 清理编译环境
      if: always()
      run: |
        cd openwrt
        make clean || true
        rm -rf build_dir logs dl tmp || true
        echo "✅ 编译环境已清理"

name: Build iStoreOS for RAX3000Q (OpenWrt 23.05)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-23.05
  CONFIG_FILE: .config

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 安装依赖
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget curl \
        libelf-dev autoconf automake libtool pkg-config

    - name: 下载OpenWrt 23.05源码
      run: |
        git clone $REPO_URL --depth=1 -b $REPO_BRANCH openwrt
        cd openwrt
        ln -sf $GITHUB_WORKSPACE/* ./

    - name: 添加iStore源
      run: |
        cd openwrt
        echo "src-git istore https://github.com/linkease/istore-openwrt-feed.git" >> feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载配置
      run: |
        cd openwrt
        cp $GITHUB_WORKSPACE/.config .config
        make defconfig

    - name: 下载软件包源码
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      run: |
        cd openwrt
        make -j$(nproc) V=s || make -j1 V=s

    - name: 上传固件
      uses: actions/upload-artifact@v6
      with:
        name: OpenWrt-23.05-RAX3000Q-iStoreOS
        path: openwrt/bin/targets/ipq50xx/arm/*.bin
        retention-days: 7

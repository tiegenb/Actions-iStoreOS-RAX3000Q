name: Build iStoreOS for RAX3000Q (OpenWrt 23.05)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-23.05
  CONFIG_FILE: .config

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: 安装依赖
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget curl \
        libelf-dev autoconf automake libtool pkg-config

    - name: 下载OpenWrt 23.05源码
      run: |
        git clone $REPO_URL --depth=1 -b $REPO_BRANCH openwrt

    - name: 配置iStore源（官方最新方法）
      run: |
        cd openwrt

        # 配置 feeds.conf.default
        echo "src-git packages https://git.openwrt.org/feed/packages.git;$REPO_BRANCH" > feeds.conf.default
        echo "src-git luci https://git.openwrt.org/project/luci.git;$REPO_BRANCH" >> feeds.conf.default
        echo "src-git routing https://git.openwrt.org/feed/routing.git;$REPO_BRANCH" >> feeds.conf.default
        echo "src-git telephony https://git.openwrt.org/feed/telephony.git;$REPO_BRANCH" >> feeds.conf.default
        
        # 添加正确的 iStore 源（主仓库）
        echo "src-git istore https://github.com/linkease/istore.git;main" >> feeds.conf.default

        # 显示配置内容
        echo "=== feeds.conf.default 内容 ==="
        cat feeds.conf.default

        # 更新所有 feeds
        echo "更新所有 feeds..."
        ./scripts/feeds update -a

        # 安装所有包（包括 iStore）
        echo "安装所有包..."
        ./scripts/feeds install -a

        # 特别验证 iStore 是否安装成功
        echo "=== 验证 iStore 安装 ==="
        if [ -d "feeds/istore" ]; then
          echo "✅ iStore feed 安装成功"
          ls -la feeds/istore/
        else
          echo "❌ iStore feed 安装失败"
          exit 1
        fi

        echo "=== 查找 luci-app-store ==="
        find package/feeds/ -name "luci-app-store" 2>/dev/null || echo "警告: luci-app-store 未找到"

    - name: 复制配置文件
      run: |
        cd openwrt
        if [ -f "$GITHUB_WORKSPACE/$CONFIG_FILE" ]; then
          echo "使用自定义配置文件: $GITHUB_WORKSPACE/$CONFIG_FILE"
          cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
          echo "配置文件复制成功"
        else
          echo "错误: 配置文件 $GITHUB_WORKSPACE/$CONFIG_FILE 不存在"
          exit 1
        fi
        
        # 生成完整配置
        make defconfig
        
        # 显示关键配置选项
        echo "=== 关键配置选项 ==="
        grep "CONFIG_PACKAGE_luci-app-store" .config || echo "luci-app-store 未在配置中启用"

    - name: 下载软件包源码
      run: |
        cd openwrt
        echo "下载软件包源码..."
        make download -j8 V=s
        # 检查下载的文件
        echo "=== 检查下载文件 ==="
        find dl -size -1024c -exec ls -l {} \; || true

    - name: 编译固件
      run: |
        cd openwrt
        echo "开始编译固件..."
        # 先尝试用多核编译，如果失败则单核编译
        make -j$(nproc) V=s || make -j1 V=s

    - name: 上传固件
      uses: actions/upload-artifact@v6
      with:
        name: OpenWrt-23.05-RAX3000Q-iStoreOS
        path: |
          openwrt/bin/targets/*/*.bin
          openwrt/bin/targets/*/*.img
          openwrt/bin/targets/*/*.gz
          openwrt/bin/targets/*/*.ubi
          openwrt/bin/targets/*/*.tar
        retention-days: 7

    - name: 上传编译日志（如果失败）
      if: failure()
      uses: actions/upload-artifact@v6
      with:
        name: build-logs
        path: |
          openwrt/logs/
          openwrt/.config
          openwrt/feeds.conf.default
          openwrt/feeds/istore/
        retention-days: 7

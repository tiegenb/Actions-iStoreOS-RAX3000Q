name: Build iStoreOS for RAX3000Q (OpenWrt 23.05)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-23.05
  CONFIG_FILE: .config

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: 安装依赖
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget curl \
        libelf-dev autoconf automake libtool pkg-config

    - name: 下载OpenWrt 23.05源码
      run: |
        git clone $REPO_URL --depth=1 -b $REPO_BRANCH openwrt

    - name: 配置iStore源
      run: |
        cd openwrt
        
        # 清空并重新配置feeds
        echo "src-git packages https://github.com/openwrt/packages.git;$REPO_BRANCH" > feeds.conf.default
        echo "src-git luci https://github.com/openwrt/luci.git;$REPO_BRANCH" >> feeds.conf.default
        echo "src-git routing https://github.com/openwrt/routing.git;$REPO_BRANCH" >> feeds.conf.default
        echo "src-git telephony https://github.com/openwrt/telephony.git;$REPO_BRANCH" >> feeds.conf.default
        
        # 添加iStore源（正确的仓库地址）
        echo "src-git istore https://github.com/linkease/istore-openwrt-feed.git" >> feeds.conf.default
        
        # 显示配置内容
        echo "=== feeds.conf.default 内容 ==="
        cat feeds.conf.default
        
        # 更新所有feeds
        echo "更新feeds..."
        ./scripts/feeds update -a
        
        # 检查feeds是否成功下载
        echo "=== 检查feeds目录 ==="
        ls -la feeds/
        
        # 安装所有包
        echo "安装feeds..."
        ./scripts/feeds install -a
        
        # 特别检查istore相关包
        echo "=== 检查istore相关包 ==="
        ./scripts/feeds search istore

    - name: 复制配置文件
      run: |
        cd openwrt
        # 只复制已存在的配置文件，如果没有则报错
        if [ -f "$GITHUB_WORKSPACE/$CONFIG_FILE" ]; then
          echo "使用自定义配置文件: $GITHUB_WORKSPACE/$CONFIG_FILE"
          cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
          echo "配置文件复制成功"
        else
          echo "错误: 配置文件 $GITHUB_WORKSPACE/$CONFIG_FILE 不存在"
          exit 1
        fi
        
        make defconfig

    - name: 下载软件包源码
      run: |
        cd openwrt
        make download -j8 V=s
        # 检查下载的文件
        find dl -size -1024c -exec ls -l {} \; || true

    - name: 编译固件
      run: |
        cd openwrt
        # 先尝试用多核编译，如果失败则单核编译
        make -j$(nproc) V=s || make -j1 V=s

    - name: 上传固件
      uses: actions/upload-artifact@v6
      with:
        name: OpenWrt-23.05-RAX3000Q-iStoreOS
        path: |
          openwrt/bin/targets/*/*.bin
          openwrt/bin/targets/*/*.img
          openwrt/bin/targets/*/*.gz
        retention-days: 7

    - name: 上传编译日志（如果失败）
      if: failure()
      uses: actions/upload-artifact@v6
      with:
        name: build-logs
        path: |
          openwrt/logs/
          openwrt/.config
          openwrt/feeds.conf.default
        retention-days: 7

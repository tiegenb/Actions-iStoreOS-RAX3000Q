name: Build iStoreOS for RAX3000Q (OpenWrt 23.05)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-23.05
  CONFIG_FILE: .config

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: 安装依赖
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-setuptools rsync swig unzip zlib1g-dev file wget curl \
        libelf-dev autoconf automake libtool pkg-config

    - name: 下载OpenWrt 23.05源码
      run: |
        git clone $REPO_URL --depth=1 -b $REPO_BRANCH openwrt

    - name: 配置iStore源
      run: |
        cd openwrt
        echo "src-git packages https://git.openwrt.org/feed/packages.git;$REPO_BRANCH" > feeds.conf.default
        echo "src-git luci https://git.openwrt.org/project/luci.git;$REPO_BRANCH" >> feeds.conf.default
        echo "src-git routing https://git.openwrt.org/feed/routing.git;$REPO_BRANCH" >> feeds.conf.default
        echo "src-git telephony https://git.openwrt.org/feed/telephony.git;$REPO_BRANCH" >> feeds.conf.default
        echo "src-git istore https://github.com/linkease/istore.git;main" >> feeds.conf.default
        
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 复制配置文件
      run: |
        cd openwrt
        cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
        make defconfig

    - name: 下载软件包源码
      run: |
        cd openwrt
        make download -j8 V=s

    - name: 应用编译修复（关键步骤）
      run: |
        cd openwrt
        
        echo "=== 应用编译修复 ==="
        
        # 修复格式安全警告
        echo "修复格式安全警告..."
        find package/network/services/dnsmasq -name "*.c" -type f -exec sed -i 's/fprintf(stderr, _("/fprintf(stderr, "%s", _("/g' {} \; 2>/dev/null || true
        
        # 修复内联警告
        echo "修复内联函数警告..."
        find package -name "*.c" -type f -exec sed -i 's/inline bool xs_has_arg/bool xs_has_arg/g' {} \; 2>/dev/null || true
        
        # 修复其他格式问题
        find package -name "*.c" -type f -exec sed -i 's/fprintf(stderr, gettext(/fprintf(stderr, "%s", gettext(/g' {} \; 2>/dev/null || true
        find package -name "*.c" -type f -exec sed -i 's/fprintf(stderr, dgettext(/fprintf(stderr, "%s", dgettext(/g' {} \; 2>/dev/null || true
        
        echo "✅ 编译修复完成"

    - name: 编译固件
      run: |
        cd openwrt
        echo "开始编译固件..."
        # 使用 V=sc 获取更详细的错误信息
        make -j$(nproc) V=s || make -j1 V=sc

    - name: 上传固件
      if: success()
      uses: actions/upload-artifact@v6
      with:
        name: OpenWrt-23.05-RAX3000Q-iStoreOS
        path: |
          openwrt/bin/targets/*/*.bin
          openwrt/bin/targets/*/*.img
          openwrt/bin/targets/*/*.ubi
        retention-days: 7

    - name: 上传编译日志（如果失败）
      if: failure()
      uses: actions/upload-artifact@v6
      with:
        name: build-logs
        path: |
          openwrt/logs/
          openwrt/.config
          openwrt/feeds.conf.default
          openwrt/feeds/istore/
        retention-days: 7
